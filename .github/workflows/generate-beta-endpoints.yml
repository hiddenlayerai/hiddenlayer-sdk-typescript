name: Generate Beta Endpoints

on:
  push:
    branches:
      - next

jobs:
  generate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Generate beta endpoint registry
        run: node scripts/utils/generate-beta-endpoints.cjs

      - name: Commit and push if changed
        run: |
          git diff --quiet src/lib/beta-endpoints.ts && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/beta-endpoints.ts
          git commit -m "chore: regenerate beta endpoint registry [skip ci]"
          git push
